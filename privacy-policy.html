            function localizePage() {
                const data = pageData[currentLang] || pageData.th;

                // Breadcrumbs & Title
                const bHome = document.getElementById('breadcrumb-home');
                const bCurrent = document.getElementById('breadcrumb-current');
                const tMain = document.getElementById('policy-title-main');
                const tSub = document.getElementById('policy-title-sub');
                const uTime = document.getElementById('policy-updated');
                const pBody = document.getElementById('policy-body');

                if (bHome) bHome.textContent = data.breadcrumbHome;
                if (bCurrent) bCurrent.textContent = data.breadcrumbCurrent;
                if (tMain) tMain.textContent = data.titleMain;
                if (tSub) tSub.textContent = data.titleSub;
                if (uTime) uTime.textContent = data.updated;
                if (pBody) pBody.innerHTML = data.content;

                // Navigation Links
                const navLinks = document.querySelectorAll('.nav-links a');
                if (navLinks.length >= 5) {
                    navLinks[0].textContent = data.navHome;
                    navLinks[1].textContent = data.navProducts;
                    navLinks[2].textContent = data.navAbout;
                    navLinks[3].textContent = data.navContact;
                    navLinks[4].textContent = currentLang === 'en' ? 'TRACKING' : 'เช็คสถานะพัสดุ';
                } else if (navLinks.length >= 4) {
                    navLinks[0].textContent = data.navHome;
                    navLinks[1].textContent = data.navProducts;
                    navLinks[2].textContent = data.navAbout;
                    navLinks[3].textContent = data.navContact;
                }

                // Footer Translations
                const colService = document.getElementById('footer-col-service');
                const linkFaq = document.getElementById('footer-link-faq');
                const link404 = document.getElementById('footer-link-404');
                const colNews = document.getElementById('footer-col-news');
                const linkPrivacy = document.getElementById('footer-link-privacy');
                const linkTerms = document.getElementById('footer-link-terms');
                const colContact = document.getElementById('footer-col-contact');

                if (colService) colService.textContent = data.colService;
                if (linkFaq) linkFaq.textContent = data.linkFaq;
                if (link404) link404.textContent = data.link404;
                if (colNews) colNews.textContent = data.colNews;
                if (linkPrivacy) linkPrivacy.textContent = data.linkPrivacy;
                if (linkTerms) linkTerms.textContent = data.linkTerms;
                if (colContact) colContact.textContent = data.colContact;

                // Search Input
                const searchInput = document.querySelector('.search-input');
                if (searchInput) {
                    searchInput.placeholder = data.searchPlaceholder;
                }
            }

            initLanguageSwitcher();
            localizePage();

            // Badge System update
            function updateBadges() {
                const cart = JSON.parse(localStorage.getItem('klinklin_cart')) || [];
                const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
                const cartBadge = document.getElementById('cart-badge');
                if (cartBadge) {
                    if (cartCount > 0) {
                        cartBadge.textContent = cartCount;
                        cartBadge.style.opacity = '1';
                    } else {
                        cartBadge.style.opacity = '0';
                    }
                }

                const favorites = JSON.parse(localStorage.getItem('klinklin_favorites')) || [];
                const favCount = favorites.length;
                const favBadge = document.getElementById('fav-badge');
                if (favBadge) {
                    if (favCount > 0) {
                        favBadge.textContent = favCount;
                        favBadge.style.opacity = '1';
                    } else {
                        favBadge.style.opacity = '0';
                    }
                }
            }
            updateBadges();
        });
